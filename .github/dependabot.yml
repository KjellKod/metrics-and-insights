version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      pip-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
